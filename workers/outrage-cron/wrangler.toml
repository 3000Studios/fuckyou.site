name = "fuckyou-outrage-cron"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Hourly cron. Fires at :03 past every hour.
[triggers]
crons = ["3 * * * *"]

# Non-secret vars. Secrets (GITHUB_TOKEN, CLOUDFLARE_API_TOKEN) are set via
# `wrangler secret put` and never committed.
[vars]
GITHUB_OWNER = "3000Studios"
GITHUB_REPO = "fuckyou.site"
GITHUB_BRANCH = "main"
GITHUB_FILE = "src/data/outrage.ts"
GIT_AUTHOR_NAME = "fuckyou.site bot"
GIT_AUTHOR_EMAIL = "bot@fuckyou.site"
# If PAGES_PROJECT is set AND CLOUDFLARE_API_TOKEN secret is provided,
# the worker will also explicitly trigger a Cloudflare Pages deploy after
# committing. Otherwise it relies on the Pages git integration.
PAGES_PROJECT = "fuckyou-site"
