name: Hourly Outrage Story

on:
  schedule:
    - cron: "3 * * * *" # every hour, 3 minutes past
  workflow_dispatch:

concurrency:
  group: hourly-outrage
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    name: Generate new outrage story
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate story
        run: node scripts/generate-outrage-story.mjs

      - name: Commit and push
        run: |
          git config user.name "fuckyou.site bot"
          git config user.email "bot@fuckyou.site"
          git add src/data/outrage.ts
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          TIMESTAMP="$(date -u +'%Y-%m-%d %H:%MZ')"
          git commit -m "outrage: auto-generate story ${TIMESTAMP}"
          git push
