<!doctype html>
<html lang="en" class="bg-ink-900 text-ink-50">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- Primary SEO (overridden per-page via react-helmet-async) -->
    <title>fuckyou.site — The internet's loudest rant, in one place</title>
    <meta
      name="description"
      content="Viral rants, relatable humor, and the kind of brutally honest takes the rest of the internet is too polite to publish. Updated constantly."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://fuckyou.site/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="fuckyou.site" />
    <meta property="og:title" content="fuckyou.site — The internet's loudest rant" />
    <meta property="og:description" content="Rants, humor, and the unfiltered truth about modern life. Welcome to the vent." />
    <meta property="og:url" content="https://fuckyou.site/" />
    <meta property="og:image" content="https://fuckyou.site/og.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="fuckyou.site" />
    <meta name="twitter:description" content="Rants, humor, and the unfiltered truth about modern life." />
    <meta name="twitter:image" content="https://fuckyou.site/og.svg" />

    <!-- Preconnect for fonts & AdSense (auto added at runtime if ID present) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />

    <!-- AdSense loader: injected dynamically in src/main.tsx so no hard-coded pub id is in HTML -->
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <noscript>
      <div style="padding:2rem;color:#fff;background:#0a0a0a;font-family:system-ui">
        This site is more fun with JavaScript on. Enable it. We promise no
        tracking nonsense beyond standard analytics and ads.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
